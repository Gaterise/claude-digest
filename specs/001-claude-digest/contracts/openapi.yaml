openapi: "3.1.0"
info:
  title: Claude Digest API
  description: |
    Claude の公式変更ログをリアルタイムに取得・日本語要約したダイジェスト記事を提供する API。
    Firebase Functions (第2世代) にデプロイされる HTTP エンドポイント群。
  version: "1.0.0"
  contact:
    name: Claude Digest Team

servers:
  - url: https://{region}-{projectId}.cloudfunctions.net/api/v1
    description: Firebase Functions (production)
    variables:
      region:
        default: asia-northeast1
      projectId:
        default: claude-digest
  - url: http://localhost:5001/{projectId}/asia-northeast1/api/v1
    description: Firebase Emulator (local development)
    variables:
      projectId:
        default: claude-digest

tags:
  - name: digests
    description: ダイジェスト記事の取得
  - name: health
    description: ヘルスチェック

paths:
  /health:
    get:
      operationId: getHealth
      summary: ヘルスチェック
      tags:
        - health
      responses:
        "200":
          description: サービス正常稼働中
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /digests:
    get:
      operationId: listDigests
      summary: ダイジェスト記事一覧を取得する
      description: |
        公開済みのダイジェスト記事を新しい順に返す。
        カーソルベースのページネーションをサポート。
      tags:
        - digests
      parameters:
        - name: limit
          in: query
          description: 1ページあたりの件数（最大50）
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: cursor
          in: query
          description: 次ページ取得用カーソル（前回レスポンスの nextCursor）
          required: false
          schema:
            type: string
        - name: category
          in: query
          description: カテゴリでフィルタリング
          required: false
          schema:
            $ref: "#/components/schemas/DigestCategory"
        - name: from
          in: query
          description: 公開日時の範囲開始（ISO 8601）
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: 公開日時の範囲終了（ISO 8601）
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: ダイジェスト記事一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDigestsResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /digests/{id}:
    get:
      operationId: getDigestById
      summary: ダイジェスト記事の詳細を取得する
      tags:
        - digests
      parameters:
        - name: id
          in: path
          description: ダイジェスト記事の ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ダイジェスト記事の詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigestArticleDetail"
        "404":
          description: 記事が見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    DigestCategory:
      type: string
      enum:
        - new_feature
        - improvement
        - bug_fix
        - deprecation
        - breaking_change
        - other
      description: |
        ダイジェスト記事のカテゴリ。
        - new_feature: 新機能
        - improvement: 改善
        - bug_fix: バグ修正
        - deprecation: 非推奨
        - breaking_change: 破壊的変更
        - other: その他

    DigestArticleSummary:
      type: object
      required:
        - id
        - title
        - keyPoints
        - categories
        - sourceUrl
        - publishedAt
        - createdAt
      properties:
        id:
          type: string
          description: ダイジェスト記事の一意 ID
        title:
          type: string
          description: 日本語タイトル
          maxLength: 255
        keyPoints:
          type: array
          description: 重要ポイント（箇条書き）
          items:
            type: string
          minItems: 1
          maxItems: 7
        categories:
          type: array
          description: カテゴリ（複数可）
          items:
            $ref: "#/components/schemas/DigestCategory"
          minItems: 1
        sourceUrl:
          type: string
          format: uri
          description: 元の公式変更ログ URL
        originalVersion:
          type: string
          nullable: true
          description: 元のバージョン番号（例: "1.9.0"）
        publishedAt:
          type: string
          format: date-time
          description: 元変更ログの公開日時（ISO 8601）
        createdAt:
          type: string
          format: date-time
          description: ダイジェスト生成日時（ISO 8601）

    DigestArticleDetail:
      allOf:
        - $ref: "#/components/schemas/DigestArticleSummary"
        - type: object
          required:
            - summary
          properties:
            summary:
              type: string
              description: 日本語要約本文（Markdown 形式）

    ListDigestsResponse:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DigestArticleSummary"
        total:
          type: integer
          description: 総件数
        nextCursor:
          type: string
          nullable: true
          description: 次ページ取得用カーソル。null の場合は最終ページ

    HealthResponse:
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
        timestamp:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: エラーコード（例: "VALIDATION_ERROR", "NOT_FOUND"）
        message:
          type: string
          description: エラーの詳細説明
        details:
          type: object
          nullable: true
          description: 追加のエラー詳細情報
